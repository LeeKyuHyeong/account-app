# account-app CI/CD — backend Gradle build+test, 그리고 통과 시 VPS 배포.
#
# 트리거: push to main / develop, 모든 PR. (배포는 main push 만)
#
# 하나의 워크플로우 안에 두 잡을 둔다:
#   backend → (성공 시) deploy
# 같은 커밋이 CI·Deploy 두 워크플로우로 나뉘어 두 번 보이던 것을 1개 run 으로 합치고,
# deploy 가 backend 통과에 의존(needs)하므로 빌드 깨진 커밋이 배포되지 않는다.
#
# 배포(deploy 잡) 필요 GitHub Secrets / Variables (Settings → Secrets and variables → Actions):
#   Secrets:   DEPLOY_SSH_PRIVATE_KEY, DEPLOY_SSH_HOST
#   Variables: DEPLOY_SSH_USER(=root), DEPLOY_SSH_PORT(=22), DEPLOY_PATH(=/root/account-app)
#   ⚠ production 승인 게이트는 GitHub → Settings → Environments → production 에
#     Required reviewer(본인) 등록 시 활성화된다. 미설정 시 승인 없이 즉시 배포.

name: CI / Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:   # 수동 배포 트리거도 허용

jobs:
  backend:
    name: Backend (Gradle build + test)
    runs-on: ubuntu-latest
    # 같은 브랜치 push 가 연달아 오면 이전 잡 취소 — 무의미한 큐 적체 방지.
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build + test
        run: ./gradlew build

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          retention-days: 7

  deploy:
    name: Deploy account-api to VPS
    needs: backend   # ← CI(build+test) 통과해야만 배포
    # main push, 또는 수동 dispatch 일 때만. (develop / PR 에서는 건너뜀)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment: production   # ← Required reviewer 승인 대기 (설정돼 있을 때)
    timeout-minutes: 15
    # 배포는 한 번에 하나만. 진행 중이면 취소하지 않고 대기(배포 중간 중단 방지).
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ vars.DEPLOY_SSH_USER }}
          port:     ${{ vars.DEPLOY_SSH_PORT }}
          key:      ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH }}
            git fetch --prune
            git checkout main
            git pull --ff-only
            docker compose -f docker-compose.prod.yml --env-file .env.prod build account-api
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d account-api
            docker image prune -f
