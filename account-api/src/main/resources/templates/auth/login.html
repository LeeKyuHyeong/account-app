<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('로그인')}"></head>
<body class="bg-body-secondary">
<main class="container" style="max-width: 420px; padding-top: 80px;">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h1 class="h4 mb-4 text-center">가계부 로그인</h1>

      <div th:if="${param.error}" class="alert alert-danger py-2 small">
        이메일 또는 비밀번호가 올바르지 않습니다.
      </div>
      <div th:if="${param.logout}" class="alert alert-success py-2 small">
        로그아웃되었습니다.
      </div>

      <form th:action="@{/login}" method="post">
        <div class="mb-3">
          <label for="email" class="form-label">이메일</label>
          <input type="email" id="email" name="email" class="form-control"
                 required autofocus autocomplete="username">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">비밀번호</label>
          <input type="password" id="password" name="password" class="form-control"
                 required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary w-100">로그인</button>
      </form>
    </div>
  </div>
  <p class="text-center text-muted small mt-3 mb-0">v1 MVP — 가구 초대 UI 미지원</p>
</main>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
