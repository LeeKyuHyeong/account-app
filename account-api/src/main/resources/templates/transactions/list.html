<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{fragments/layout :: page('거래 목록', ~{::content})}">
  <th:block th:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h5 mb-0">거래 목록</h1>
      <a th:href="@{/web/transactions/new}" class="btn btn-primary btn-sm">+ 입력</a>
    </div>

    <form method="get" th:action="@{/web/transactions}" class="row g-2 mb-3">
      <div class="col-6">
        <label class="form-label small mb-0">시작일</label>
        <input type="date" name="from" class="form-control form-control-sm" th:value="${fFrom}">
      </div>
      <div class="col-6">
        <label class="form-label small mb-0">종료일</label>
        <input type="date" name="to" class="form-control form-control-sm" th:value="${fTo}">
      </div>
      <div class="col-6">
        <label class="form-label small mb-0">카테고리</label>
        <select name="categoryId" class="form-select form-select-sm">
          <option value="">전체</option>
          <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
                  th:selected="${fCategoryId != null and fCategoryId == c.id}"></option>
        </select>
      </div>
      <div class="col-6">
        <label class="form-label small mb-0">상태</label>
        <select name="status" class="form-select form-select-sm">
          <option value="">전체</option>
          <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                  th:selected="${fStatus != null and fStatus == s}"></option>
        </select>
      </div>
      <div class="col-12 d-grid">
        <button type="submit" class="btn btn-outline-secondary btn-sm">필터 적용</button>
      </div>
    </form>

    <div th:if="${page.content.isEmpty()}" class="text-center text-muted py-5">
      거래가 없습니다.
    </div>

    <div th:each="entry : ${byDate}" class="mb-3">
      <div class="text-muted small fw-semibold mb-1"
           th:text="${#temporals.format(entry.key, 'yyyy-MM-dd')}">2026-05-26</div>
      <div class="list-group">
        <a th:each="t : ${entry.value}" th:href="@{/web/transactions/{id}(id=${t.id})}"
           class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
          <div>
            <div>
              <span th:text="${t.categoryName}">식비</span>
              <span th:if="${t.status.name() == 'DRAFT'}"
                    class="badge bg-warning text-dark ms-1">초안</span>
            </div>
            <div class="small text-muted" th:text="${t.merchant} ?: '-'">상점</div>
          </div>
          <span class="fw-semibold"
                th:classappend="${t.categoryType.name() == 'INCOME'} ? 'text-success' : ''"
                th:text="${#numbers.formatInteger(t.amount, 0, 'COMMA')} + '원'">0원</span>
        </a>
      </div>
    </div>

    <div class="d-flex justify-content-between" th:if="${!page.content.isEmpty()}">
      <a class="btn btn-outline-secondary btn-sm" th:if="${page.page > 0}"
         th:href="'/web/transactions?page=' + ${page.page - 1} + ${filterQuery}">← 이전</a>
      <span></span>
      <a class="btn btn-outline-secondary btn-sm" th:if="${page.hasNext}"
         th:href="'/web/transactions?page=' + ${page.page + 1} + ${filterQuery}">다음 →</a>
    </div>

  </th:block>
</th:block>
</body>
</html>
