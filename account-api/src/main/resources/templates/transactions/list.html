<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{fragments/layout :: page('거래 목록', ~{::content})}">
  <th:block th:fragment="content"
            th:with="hasFilter=${fFrom != null or fTo != null or fCategoryId != null or fStatus != null}">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h1 class="toss-page-title">거래</h1>
        <p class="toss-page-subtitle" th:text="'총 ' + ${page.totalElements} + '건'">총 0건</p>
      </div>
      <div class="d-flex gap-2 align-items-center">
        <!-- 필터 토글 — 필터 미설정 시 접힘, 설정되어 있으면 펼침 (어떤 필터로 보고 있는지 명시) -->
        <button class="btn toss-pill" type="button"
                data-bs-toggle="collapse" data-bs-target="#filterForm"
                th:aria-expanded="${hasFilter}" aria-controls="filterForm">
          필터<span th:if="${hasFilter}" class="ms-1" aria-hidden="true"
                    style="color: var(--toss-primary);">●</span>
        </button>
        <a th:href="${filterQuery.isEmpty()} ? @{/web/transactions/export} : '/web/transactions/export?' + ${filterQuery.substring(1)}"
           class="btn toss-pill">CSV</a>
        <a th:href="@{/web/transactions/new}" class="btn toss-pill toss-pill--primary">+ 입력</a>
      </div>
    </div>

    <div id="filterForm" class="collapse mb-3" th:classappend="${hasFilter} ? 'show' : ''">
      <div class="toss-card">
        <form method="get" th:action="@{/web/transactions}" class="row g-2">
          <div class="col-6">
            <label class="form-label small mb-0">시작일</label>
            <input type="date" name="from" class="form-control form-control-sm" th:value="${fFrom}">
          </div>
          <div class="col-6">
            <label class="form-label small mb-0">종료일</label>
            <input type="date" name="to" class="form-control form-control-sm" th:value="${fTo}">
          </div>
          <div class="col-6">
            <label class="form-label small mb-0">카테고리</label>
            <select name="categoryId" class="form-select form-select-sm">
              <option value="">전체</option>
              <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
                      th:selected="${fCategoryId != null and fCategoryId == c.id}"></option>
            </select>
          </div>
          <div class="col-6">
            <label class="form-label small mb-0">상태</label>
            <select name="status" class="form-select form-select-sm">
              <option value="">전체</option>
              <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                      th:selected="${fStatus != null and fStatus == s}"></option>
            </select>
          </div>
          <div class="col-12 d-grid">
            <button type="submit" class="btn toss-cta toss-cta-primary">필터 적용</button>
          </div>
        </form>
      </div>
    </div>

    <div th:if="${page.content.isEmpty()}" class="toss-empty">
      거래가 없습니다.
    </div>

    <th:block th:each="entry : ${byDate}">
      <div class="toss-group-label" th:text="${#temporals.format(entry.key, 'yyyy-MM-dd')}">2026-05-26</div>
      <div class="toss-card toss-card--flush">
        <a th:each="t : ${entry.value}" th:href="@{/web/transactions/{id}(id=${t.id})}"
           class="toss-list-row">
          <div class="toss-list-row__main">
            <div class="toss-list-row__title">
              <span th:text="${t.categoryName}">식비</span>
              <span th:if="${t.status.name() == 'DRAFT'}"
                    class="toss-badge toss-badge--warning ms-1">초안</span>
            </div>
            <div class="toss-list-row__sub" th:text="${t.merchant} ?: '-'">상점</div>
          </div>
          <span class="toss-list-row__amount"
                th:classappend="${t.categoryType.name() == 'INCOME'} ? 'toss-list-row__amount--income' : ''"
                th:text="${(t.categoryType.name() == 'INCOME' ? '+' : '')} + ${#numbers.formatInteger(t.amount, 0, 'COMMA')} + '원'">0원</span>
        </a>
      </div>
    </th:block>

    <div class="toss-pager" th:if="${!page.content.isEmpty()}">
      <a class="btn toss-cta toss-cta-secondary" th:if="${page.page > 0}"
         th:href="'/web/transactions?page=' + ${page.page - 1} + ${filterQuery}">← 이전</a>
      <span></span>
      <a class="btn toss-cta toss-cta-secondary" th:if="${page.hasNext}"
         th:href="'/web/transactions?page=' + ${page.page + 1} + ${filterQuery}">다음 →</a>
    </div>

  </th:block>
</th:block>
</body>
</html>
