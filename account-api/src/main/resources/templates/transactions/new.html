<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{fragments/layout :: page('거래 입력', ~{::content})}">
  <th:block th:fragment="content">

    <div class="mb-3">
      <h1 class="toss-page-title">거래 입력</h1>
      <p class="toss-page-subtitle">직접 거래를 추가합니다</p>
    </div>

    <!-- form / errors 는 Map. 없는 키에서 예외가 나지 않도록 대괄호 인덱서로 접근. -->
    <form method="post" th:action="@{/web/transactions/new}" class="toss-form">
      <div class="toss-card mb-3">
        <div class="mb-3">
          <label class="form-label">카테고리</label>
          <select name="categoryId" class="form-select"
                  th:classappend="${errors['categoryId']} ? 'is-invalid' : ''">
            <option value="">선택하세요</option>
            <option th:each="c : ${categories}" th:value="${c.id}" th:text="|${c.name} (${c.type})|"
                    th:selected="${form['categoryId'] != null and form['categoryId'] == #strings.toString(c.id)}"></option>
          </select>
          <div class="invalid-feedback d-block" th:if="${errors['categoryId']}" th:text="${errors['categoryId']}"></div>
        </div>

        <div class="mb-3">
          <label class="form-label">금액 (원)</label>
          <input type="number" inputmode="decimal" step="0.01" name="amount" class="form-control"
                 th:classappend="${errors['amount']} ? 'is-invalid' : ''" th:value="${form['amount']}">
          <div class="invalid-feedback d-block" th:if="${errors['amount']}" th:text="${errors['amount']}"></div>
        </div>

        <div class="mb-3">
          <label class="form-label">일시</label>
          <input type="datetime-local" name="occurredAt" class="form-control"
                 th:classappend="${errors['occurredAt']} ? 'is-invalid' : ''"
                 th:value="${form['occurredAt']} ?: ${defaultOccurredAt}">
          <div class="invalid-feedback d-block" th:if="${errors['occurredAt']}" th:text="${errors['occurredAt']}"></div>
        </div>

        <div class="mb-3">
          <label class="form-label">상점 <span style="color: var(--toss-text-muted); font-weight: 400;">(선택)</span></label>
          <input type="text" name="merchant" class="form-control" th:value="${form['merchant']}">
        </div>

        <div class="mb-3">
          <label class="form-label">결제수단 <span style="color: var(--toss-text-muted); font-weight: 400;">(선택)</span></label>
          <select name="paymentMethod" class="form-select">
            <option value="" th:selected="${form['paymentMethod'] == null or form['paymentMethod'] == ''}">미지정</option>
            <option value="신용카드" th:selected="${form['paymentMethod'] == '신용카드'}">신용카드</option>
            <option value="체크카드" th:selected="${form['paymentMethod'] == '체크카드'}">체크카드</option>
            <option value="현금" th:selected="${form['paymentMethod'] == '현금'}">현금</option>
            <option value="계좌이체" th:selected="${form['paymentMethod'] == '계좌이체'}">계좌이체</option>
            <option value="간편결제" th:selected="${form['paymentMethod'] == '간편결제'}">간편결제</option>
          </select>
        </div>

        <div class="mb-0">
          <label class="form-label">메모 <span style="color: var(--toss-text-muted); font-weight: 400;">(선택)</span></label>
          <textarea name="memo" class="form-control" rows="2" th:text="${form['memo']}"></textarea>
        </div>
      </div>

      <div class="d-grid gap-2">
        <button type="submit" class="btn toss-cta toss-cta-primary">저장</button>
        <a th:href="@{/web/transactions}" class="btn toss-cta toss-cta-secondary">취소</a>
      </div>
    </form>

  </th:block>
</th:block>
</body>
</html>
