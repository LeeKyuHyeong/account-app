<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar bg-body-tertiary border-bottom">
  <div class="container">
    <a class="navbar-brand" th:href="@{/web/home}">가계부</a>
    <div class="d-flex align-items-center gap-2" sec:authorize="isAuthenticated()">
      <a class="nav-link" th:href="@{/web/transactions}">거래</a>
      <span class="text-muted small" sec:authentication="principal.email">user@example.com</span>
      <form th:action="@{/logout}" method="post" class="d-inline">
        <button class="btn btn-outline-secondary btn-sm" type="submit">로그아웃</button>
      </form>
    </div>
  </div>
</nav>
</body>
</html>
