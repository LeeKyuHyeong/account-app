spring:
  application:
    name: account-api

  # ─── 시크릿 분리 (§10.2 KH Shop 패턴) ───
  # 프로젝트 루트의 application-secret.yml 을 병합 로드 (gitignored).
  # 파일이 없어도 기동에 실패하지 않도록 optional: 접두사 사용.
  # 운영에서는 본 파일 대신 환경변수 (ACCOUNT_CLAUDE_API_KEY 등) 로 주입.
  config:
    import: optional:file:./application-secret.yml

  # Java 21 가상 스레드 — DB / Claude API 동기 호출이 캐리어 스레드를 점유하지 않음
  threads:
    virtual:
      enabled: true

  # ─── DataSource (MariaDB) ───
  # 운영에서는 ACCOUNT_DB_* 환경변수로 반드시 오버라이드. 기본값은 로컬
  # docker-compose 와 맞춰둔 dev 전용 값이며, 시크릿이 아니다.
  datasource:
    # 로컬 docker-compose 가 호스트 3305 로 노출 (기존 mysqld 가 3306 점유).
    # 운영에서는 ACCOUNT_DB_PORT 환경변수로 표준 3306 (또는 사내 포트) 오버라이드.
    url: jdbc:mariadb://${ACCOUNT_DB_HOST:localhost}:${ACCOUNT_DB_PORT:3305}/${ACCOUNT_DB_NAME:account}?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul
    username: ${ACCOUNT_DB_USER:account}
    password: ${ACCOUNT_DB_PASSWORD:accountlocal}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      pool-name: account-api-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000

  # ─── JPA / Hibernate ───
  # 스키마 관리는 Flyway 단독 책임. JPA 는 entity ↔ schema 정합성 검증만 수행.
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
    open-in-view: false

  # ─── Flyway ───
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  # ─── 멀티파트 업로드 (영수증) ───
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

# 영수증 이미지 저장 루트.
#   개발: ./data/receipts (프로젝트 루트 기준, gitignored)
#   운영: ACCOUNT_RECEIPTS_STORAGE_ROOT=/mnt/data/receipts 환경변수로 오버라이드
# 실제 경로 = {root}/{householdId}/{yyyy}/{mm}/{uuid}.{ext}

# 시크릿 placeholder — 실제 운영 값은 환경변수 또는 application-secret.yml 에서 주입.
# 본 placeholder 는 ApplicationContext 기동 검증용. 실제 Claude 호출 시 401 발생.
account:
  claude:
    api-key: ${ACCOUNT_CLAUDE_API_KEY:placeholder-set-via-application-secret-yml}
  jwt:
    # 빈 문자열을 기본값으로 둬서 application-secret.yml 또는 env 미설정 시
    # JwtProperties @PostConstruct 단계에서 명확한 에러로 기동 실패하도록 한다.
    secret: ${ACCOUNT_JWT_SECRET:}
    access-ttl: ${ACCOUNT_JWT_ACCESS_TTL:PT15M}
    refresh-ttl: ${ACCOUNT_JWT_REFRESH_TTL:P30D}
  receipts:
    storage-root: ${ACCOUNT_RECEIPTS_STORAGE_ROOT:./data/receipts}

logging:
  level:
    com.kyuhyeong: DEBUG
    org.flywaydb: INFO
    # Hibernate SQL 보고 싶으면 DEBUG
    org.hibernate.SQL: INFO
